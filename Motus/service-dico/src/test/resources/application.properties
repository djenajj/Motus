# ===================================================================
# Configuration utilisee UNIQUEMENT pendant les tests automatises.
# Spring Boot Test donne priorite a ce fichier sur celui de
# src/main/resources quand les tests s'executent.
#
# On garde H2 en memoire ici : les tests doivent rester rapides,
# reproductibles et independants d'un serveur PostgreSQL externe.
# ===================================================================
spring.datasource.url=jdbc:h2:mem:dicodb-test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
