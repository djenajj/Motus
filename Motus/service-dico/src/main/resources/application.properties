# ===================================================================
# Configuration du Service Dico (microservice Dictionnaire de Motus)
# ===================================================================

# Nom de l'application
spring.application.name=service-dico

# Port d'ecoute du microservice (8083 selon l'architecture)
server.port=8083

# -------------------------------------------------------------------
# Base de donnees PostgreSQL (persistante)
# -------------------------------------------------------------------
# Un seul serveur Postgres (conteneur "postgres") heberge une base
# separee par microservice (dicodb / joueurdb / partiedb) - voir
# docker-compose.yml et supports-de-cours/init-databases.sql.
# En execution locale hors Docker, "localhost" fonctionne aussi
# (Postgres expose le port 5432 sur la machine hote).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dicodb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:motus}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:motus}

# -------------------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------------------
# update (et non create-drop) : Hibernate cree les tables manquantes
# au premier demarrage mais NE SUPPRIME PLUS les donnees existantes
# aux demarrages suivants - c'est ce qui rend les donnees persistantes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Affiche les requetes SQL dans la console (pratique pour comprendre)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
