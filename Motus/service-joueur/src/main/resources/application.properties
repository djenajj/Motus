# ===================================================================
# Configuration du Service Joueur (microservice Joueur de Motus)
# ===================================================================

# Nom de l'application
spring.application.name=service-joueur

# Port d'ecoute du microservice (8081 selon l'architecture)
server.port=8081

# -------------------------------------------------------------------
# Base de donnees PostgreSQL (persistante)
# -------------------------------------------------------------------
# Un seul serveur Postgres (conteneur "postgres") heberge une base
# separee par microservice - voir docker-compose.yml.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/joueurdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:motus}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:motus}

# -------------------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------------------
# update (et non create-drop) : les tables manquantes sont creees au
# premier demarrage, les donnees existantes ne sont plus effacees.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
