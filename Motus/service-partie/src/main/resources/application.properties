# ===================================================================
# Configuration du Service Partie (microservice Partie de Motus)
# ===================================================================

# Nom de l'application
spring.application.name=service-partie

# Port d'ecoute du microservice (8082 selon l'architecture)
server.port=8082

# -------------------------------------------------------------------
# Base de donnees PostgreSQL (persistante)
# -------------------------------------------------------------------
# Un seul serveur Postgres (conteneur "postgres") heberge une base
# separee par microservice - voir docker-compose.yml.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/partiedb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:motus}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:motus}

# -------------------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------------------
# update (et non create-drop) : les tables manquantes sont creees au
# premier demarrage, les donnees existantes ne sont plus effacees.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------------------
# URLs des autres microservices (communication REST)
# -------------------------------------------------------------------
# En local : on pointe vers les ports des autres services.
# En Docker / Kubernetes : on surcharge ces valeurs via des
# variables d'environnement (SERVICES_DICO_URL, SERVICES_JOUEUR_URL)
# sans toucher au code. La syntaxe ${VAR:valeur_par_defaut} utilise
# la variable d'environnement si elle existe, sinon la valeur locale.
services.dico.url=${SERVICES_DICO_URL:http://localhost:8083}
services.joueur.url=${SERVICES_JOUEUR_URL:http://localhost:8081}
