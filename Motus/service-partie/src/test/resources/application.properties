# ===================================================================
# Configuration utilisee UNIQUEMENT pendant les tests automatises.
# Spring Boot Test donne priorite a ce fichier sur celui de
# src/main/resources quand les tests s'executent.
#
# On garde H2 en memoire ici : les tests doivent rester rapides,
# reproductibles et independants d'un serveur PostgreSQL externe.
# ===================================================================
spring.datasource.url=jdbc:h2:mem:partiedb-test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Les clients REST inter-services sont mockes dans les tests
# (@MockBean DicoClient/JoueurClient), ces URLs ne sont donc jamais
# reellement appelees, mais doivent exister pour que le contexte
# Spring demarre (injection @Value dans DicoClient/JoueurClient).
services.dico.url=http://localhost:8083
services.joueur.url=http://localhost:8081
